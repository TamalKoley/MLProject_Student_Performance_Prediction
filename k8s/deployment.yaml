apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers: 
        - name: student-app
          image: student-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 10222
---
apiVersion: v1
kind: Service
metadata:
  name: student-app
spec:
  type: NodePort
  selector: 
    app: student-app
  ports:
    - protocol: TCP
      port: 10222
      targetPort: 10222
      nodePort: 30030